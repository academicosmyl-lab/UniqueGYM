# Infraestructura LOCAL y gratuita para Fase 0.
# Levanta PostgreSQL + Adminer. No requiere ningún servicio de pago.
services:
  db:
    image: postgres:16-alpine
    container_name: unique_gym_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unique_gym
    ports:
      - "5432:5432"
    volumes:
      - ug_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
  adminer:
    image: adminer
    container_name: unique_gym_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
volumes:
  ug_data:
