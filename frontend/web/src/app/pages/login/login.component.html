<div class="login-wrap">
  <div class="login-card ug-card">
    <div style="text-align:center; margin-bottom: var(--ug-2xl)">
      <span class="ug-display" style="font-size:32px; color:var(--ug-verde)">UNIQUE GYM</span>
      <p style="color:var(--ug-apagado); margin-top: var(--ug-sm); font-size:13px">Panel de gestion — Ingresa tus credenciales</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label style="color:var(--ug-apagado); font-size:12px; display:block; margin-bottom:var(--ug-xs)">Correo electronico</label>
        <input
          class="ug-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label style="color:var(--ug-apagado); font-size:12px; display:block; margin-bottom:var(--ug-xs)">Contrasena</label>
        <input
          class="ug-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <p class="ug-text-error" style="font-size:13px; margin-top: var(--ug-sm)">{{ error() }}</p>
      }

      <button
        type="submit"
        class="ug-btn-primary w-full"
        style="margin-top: var(--ug-xl); width:100%"
        [disabled]="loading()"
      >
        {{ loading() ? 'Ingresando...' : 'INGRESAR' }}
      </button>
    </form>
  </div>
</div>

<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ug-negro);
    padding: var(--ug-xl);
  }
  .login-card {
    width: 100%;
    max-width: 400px;
  }
  .field {
    margin-bottom: var(--ug-lg);
  }
</style>
