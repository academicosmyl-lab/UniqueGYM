<div class="login-wrap">

  <!-- Panel izquierdo: imagen del equipo -->
  <div class="login-panel-img">
    <img src="/gym-hero.png" alt="Equipo Unique Gym" class="hero-img" />
    <div class="img-overlay"></div>
    <div class="img-badge">
      <span class="badge-lema">FORMA TU CUERPO</span>
    </div>
  </div>

  <!-- Panel derecho: formulario -->
  <div class="login-panel-form">

    <div class="form-inner">
      <!-- Marca -->
      <div class="login-brand">
        <div class="brand-circle">U</div>
        <div class="brand-text">
          <span class="brand-nombre">UNIQUE GYM</span>
          <span class="brand-lema">Asesorías Profesionales M&amp;L</span>
        </div>
      </div>

      <h2 class="form-titulo">Bienvenido</h2>
      <p class="form-sub">Panel de gestión — ingresa tus credenciales</p>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="field">
          <label class="field-label">Correo electrónico</label>
          <input
            class="field-input"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="correo@ejemplo.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label class="field-label">Contraseña</label>
          <input
            class="field-input"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        @if (error()) {
          <p class="field-error">{{ error() }}</p>
        }

        <button type="submit" class="btn-ingresar" [disabled]="loading()">
          {{ loading() ? 'INGRESANDO...' : 'INGRESAR' }}
        </button>
      </form>
    </div>

  </div>
</div>

<style>
  /* ── Layout principal ── */
  .login-wrap {
    position: fixed;
    inset: 0;
    display: flex;
  }

  /* ── Panel izquierdo (imagen) ── */
  .login-panel-img {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: none;
  }

  @media (min-width: 768px) {
    .login-panel-img { display: block; }
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(5, 5, 5, 0) 60%,
      rgba(5, 5, 5, 0.85) 100%
    );
  }

  .img-badge {
    position: absolute;
    bottom: 32px;
    left: 32px;
    background: rgba(29, 222, 16, 0.15);
    border: 1px solid rgba(29, 222, 16, 0.4);
    border-radius: 8px;
    padding: 8px 16px;
    backdrop-filter: blur(8px);
  }

  .badge-lema {
    font-size: 12px;
    font-weight: 800;
    color: #1DDE10;
    letter-spacing: 0.2em;
  }

  /* ── Panel derecho (formulario) ── */
  .login-panel-form {
    width: 100%;
    max-width: 460px;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    box-sizing: border-box;
    border-left: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto;
  }

  .form-inner {
    width: 100%;
    max-width: 360px;
  }

  /* ── Marca ── */
  .login-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }

  .brand-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #1DDE10;
    color: #050505;
    font-size: 24px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(29, 222, 16, 0.4);
    flex-shrink: 0;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-nombre {
    font-size: 20px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .brand-lema {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  /* ── Títulos ── */
  .form-titulo {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .form-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin: 0 0 32px;
  }

  /* ── Campos ── */
  .field {
    margin-bottom: 20px;
  }

  .field-label {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    color: #ffffff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-sizing: border-box;
    font-family: inherit;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.2); }

  .field-input:focus {
    border-color: #1DDE10;
    box-shadow: 0 0 0 3px rgba(29,222,16,0.12);
    background: rgba(255,255,255,0.08);
  }

  .field-error {
    font-size: 12px;
    color: #ff6b6b;
    margin: -8px 0 16px;
    padding: 8px 12px;
    background: rgba(255,107,107,0.08);
    border-radius: 8px;
    border: 1px solid rgba(255,107,107,0.2);
  }

  /* ── Botón ── */
  .btn-ingresar {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    background: #1DDE10;
    color: #050505;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(29,222,16,0.3);
    font-family: inherit;
  }

  .btn-ingresar:hover:not(:disabled) {
    background: #25f715;
    box-shadow: 0 6px 28px rgba(29,222,16,0.45);
    transform: translateY(-1px);
  }

  .btn-ingresar:active:not(:disabled) { transform: translateY(0); }
  .btn-ingresar:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ── Mobile: solo el formulario, sin imagen ── */
  @media (max-width: 767px) {
    .login-panel-form {
      max-width: 100%;
      padding: 40px 24px;
    }
  }
</style>
